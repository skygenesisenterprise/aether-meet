services:
  postgresql:
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      start_period: 20s
      interval: 30s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: ${PG_DB:-postgres}
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASS:-postgres}
    expose:
      - "5432"
    volumes:
      - database:/var/lib/postgresql/data

  redis:
    image: docker.io/library/redis:8-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --loglevel
      - warning
      - --requirepass
      - ${REDIS_PASSWORD:-redis-default-password}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-default-password}
    expose:
      - "6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      start_period: 20s
      interval: 30s
      timeout: 5s
      retries: 5
    volumes:
      - redis:/data

  livekit:
    image: livekit/livekit-server:${LIVEKIT_IMAGE_TAG:-v1.8.3}
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - /etc/livekit/render-livekit-config.sh
    ports:
      - "${LIVEKIT_PORT:-7880}:7880/tcp"
      - "${LIVEKIT_RTC_TCP_PORT:-7881}:7881/tcp"
      - "${LIVEKIT_RTP_PORT_MIN:-50000}-${LIVEKIT_RTP_PORT_MAX:-50100}:50000-50100/udp"
    environment:
      LIVEKIT_PORT: ${LIVEKIT_PORT:-7880}
      LIVEKIT_RTC_TCP_PORT: ${LIVEKIT_RTC_TCP_PORT:-7881}
      LIVEKIT_RTP_PORT_MIN: ${LIVEKIT_RTP_PORT_MIN:-50000}
      LIVEKIT_RTP_PORT_MAX: ${LIVEKIT_RTP_PORT_MAX:-50100}
      LIVEKIT_KEYS: ${LIVEKIT_API_KEY:-devkey}:${LIVEKIT_API_SECRET:-secret}
      LIVEKIT_REDIS_ADDRESS: redis:6379
      LIVEKIT_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-default-password}
      LIVEKIT_WEBHOOK_URL: http://webrtc:8080/api/v1/internal/webrtc/livekit/webhook
    volumes:
      - ./infrastructure/livekit/livekit.yaml:/etc/livekit/livekit.yaml:ro
      - ./infrastructure/livekit/render-livekit-config.sh:/etc/livekit/render-livekit-config.sh:ro
    depends_on:
      redis:
        condition: service_healthy

  server:
    build:
      context: .
      dockerfile: Dockerfile.cloud
      args:
        DATABASE_URL: postgresql://${PG_USER:-postgres}:${PG_PASS:-postgres}@postgresql:5432/${PG_DB:-postgres}
    image: skygenesisenterprise/aether-meet:${APP_IMAGE_TAG:-cloud}
    restart: unless-stopped
    env_file:
      - .env
    command: server
    expose:
      - "3000"
      - "8080"
    environment:
      NODE_ENV: production
      USE_EMBEDDED_DB: "false"

      LISTEN__TRUSTED_PROXY_CIDRS: 0.0.0.0/0,::/0
      HOST: ${DOMAIN_HOST:-localhost}
      FRONTEND_PORT: "3000"
      API_PORT: "8080"

      POSTGRESQL__HOST: postgresql
      POSTGRESQL__PORT: "5432"
      POSTGRESQL__USER: ${PG_USER:-postgres}
      POSTGRESQL__NAME: ${PG_DB:-postgres}
      POSTGRESQL__PASSWORD: ${PG_PASS:-postgres}
      DATABASE_URL: postgresql://${PG_USER:-postgres}:${PG_PASS:-postgres}@postgresql:5432/${PG_DB:-postgres}

      REDIS_ENABLED: "true"
      REDIS_REQUIRED: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-default-password}
      REDIS_DB: "0"
      REDIS_URL: redis://default:${REDIS_PASSWORD:-redis-default-password}@redis:6379/0
      REDIS_KEY_PREFIX: aether-meet:v1
      REDIS_DEFAULT_TTL: "300"
      LIVEKIT_ENABLED: "true"
      WEBRTC_PROVIDER: ${WEBRTC_PROVIDER:-livekit}
      LIVEKIT_INTERNAL_URL: ${LIVEKIT_INTERNAL_URL:-http://livekit:7880}
      LIVEKIT_PUBLIC_URL: ${LIVEKIT_PUBLIC_URL:-wss://webrtc.meet.skygenesisenterprise.com}
      WEBRTC_PUBLIC_URL: ${WEBRTC_PUBLIC_URL:-wss://webrtc.meet.skygenesisenterprise.com}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-secret}
      WEBRTC_NODE_ID: ${WEBRTC_NODE_ID:-aether-meet-node-1}
      WEBRTC_REGION: ${WEBRTC_REGION:-eu-west}
      WEBRTC_TOKEN_TTL: ${WEBRTC_TOKEN_TTL:-10m}
      LIVEKIT_RTC_TCP_PORT: ${LIVEKIT_RTC_TCP_PORT:-7881}
      LIVEKIT_RTP_PORT_MIN: ${LIVEKIT_RTP_PORT_MIN:-50000}
      LIVEKIT_RTP_PORT_MAX: ${LIVEKIT_RTP_PORT_MAX:-50100}
      TURN_ENABLED: ${TURN_ENABLED:-false}
      TURN_URL: ${TURN_URL:-}
      TURN_USERNAME: ${TURN_USERNAME:-}
      TURN_PASSWORD: ${TURN_PASSWORD:-}

    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media:/media
      - certs:/certs
      - custom-templates:/templates

  worker:
    build:
      context: .
      dockerfile: Dockerfile.cloud
      args:
        DATABASE_URL: postgresql://${PG_USER:-postgres}:${PG_PASS:-postgres}@postgresql:5432/${PG_DB:-postgres}
    image: skygenesisenterprise/aether-meet:${APP_IMAGE_TAG:-cloud}
    restart: unless-stopped
    env_file:
      - .env
    command: worker
    expose:
      - "8080"
    environment:
      NODE_ENV: production
      USE_EMBEDDED_DB: "false"
      WORKER_WAIT_FOR_DB: "true"

      HOST: ${DOMAIN_HOST:-localhost}

      POSTGRESQL__HOST: postgresql
      POSTGRESQL__PORT: "5432"
      POSTGRESQL__USER: ${PG_USER:-postgres}
      POSTGRESQL__NAME: ${PG_DB:-postgres}
      POSTGRESQL__PASSWORD: ${PG_PASS:-postgres}
      DATABASE_URL: postgresql://${PG_USER:-postgres}:${PG_PASS:-postgres}@postgresql:5432/${PG_DB:-postgres}

      REDIS_ENABLED: "true"
      REDIS_REQUIRED: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-default-password}
      REDIS_DB: "0"
      REDIS_URL: redis://default:${REDIS_PASSWORD:-redis-default-password}@redis:6379/0
      REDIS_KEY_PREFIX: aether-meet:v1
      LIVEKIT_ENABLED: "true"
      WEBRTC_PROVIDER: ${WEBRTC_PROVIDER:-livekit}
      LIVEKIT_INTERNAL_URL: ${LIVEKIT_INTERNAL_URL:-http://livekit:7880}
      LIVEKIT_PUBLIC_URL: ${LIVEKIT_PUBLIC_URL:-wss://webrtc.meet.skygenesisenterprise.com}
      WEBRTC_PUBLIC_URL: ${WEBRTC_PUBLIC_URL:-wss://webrtc.meet.skygenesisenterprise.com}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-secret}
      WEBRTC_NODE_ID: ${WEBRTC_NODE_ID:-aether-meet-node-1}
      WEBRTC_REGION: ${WEBRTC_REGION:-eu-west}
      WEBRTC_TOKEN_TTL: ${WEBRTC_TOKEN_TTL:-10m}

    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      livekit:
        condition: service_started
    volumes:
      - media:/media
      - certs:/certs
      - custom-templates:/templates

  webrtc:
    build:
      context: .
      dockerfile: Dockerfile.cloud
      args:
        DATABASE_URL: postgresql://${PG_USER:-postgres}:${PG_PASS:-postgres}@postgresql:5432/${PG_DB:-postgres}
    image: skygenesisenterprise/aether-meet:${APP_IMAGE_TAG:-cloud}
    restart: unless-stopped
    env_file:
      - .env
    command: webrtc
    expose:
      - "8080"
    environment:
      NODE_ENV: production
      USE_EMBEDDED_DB: "false"

      HOST: ${DOMAIN_HOST:-localhost}

      POSTGRESQL__HOST: postgresql
      POSTGRESQL__PORT: "5432"
      POSTGRESQL__USER: ${PG_USER:-postgres}
      POSTGRESQL__NAME: ${PG_DB:-postgres}
      POSTGRESQL__PASSWORD: ${PG_PASS:-postgres}
      DATABASE_URL: postgresql://${PG_USER:-postgres}:${PG_PASS:-postgres}@postgresql:5432/${PG_DB:-postgres}

      REDIS_ENABLED: "true"
      REDIS_REQUIRED: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-default-password}
      REDIS_DB: "0"
      REDIS_URL: redis://default:${REDIS_PASSWORD:-redis-default-password}@redis:6379/0
      REDIS_KEY_PREFIX: aether-meet:v1
      LIVEKIT_ENABLED: "true"
      WEBRTC_PROVIDER: ${WEBRTC_PROVIDER:-livekit}
      LIVEKIT_INTERNAL_URL: ${LIVEKIT_INTERNAL_URL:-http://livekit:7880}
      LIVEKIT_PUBLIC_URL: ${LIVEKIT_PUBLIC_URL:-wss://webrtc.meet.skygenesisenterprise.com}
      WEBRTC_PUBLIC_URL: ${WEBRTC_PUBLIC_URL:-wss://webrtc.meet.skygenesisenterprise.com}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-secret}
      WEBRTC_NODE_ID: ${WEBRTC_NODE_ID:-aether-meet-node-1}
      WEBRTC_REGION: ${WEBRTC_REGION:-eu-west}
      WEBRTC_TOKEN_TTL: ${WEBRTC_TOKEN_TTL:-10m}
      LIVEKIT_RTC_TCP_PORT: ${LIVEKIT_RTC_TCP_PORT:-7881}
      LIVEKIT_RTP_PORT_MIN: ${LIVEKIT_RTP_PORT_MIN:-50000}
      LIVEKIT_RTP_PORT_MAX: ${LIVEKIT_RTP_PORT_MAX:-50100}
      TURN_ENABLED: ${TURN_ENABLED:-false}
      TURN_URL: ${TURN_URL:-}
      TURN_USERNAME: ${TURN_USERNAME:-}
      TURN_PASSWORD: ${TURN_PASSWORD:-}

    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      livekit:
        condition: service_started
    volumes:
      - media:/media
      - certs:/certs

volumes:
  database:
  redis:
  media:
  certs:
  custom-templates:
