services:
  nginx:
    image: docker.io/library/nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - ${DEV_HTTP_BIND_HOST:-0.0.0.0}:${DEV_HTTP_PORT:-80}:80
    volumes:
      - ./infrastructure/web/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      server:
        condition: service_started

  postgresql:
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 5s
    volumes:
      - database:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${PG_PASS:-postgres}
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_DB: ${PG_DB:-postgres}
    expose:
      - 5432

  redis:
    image: docker.io/library/redis:8-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --loglevel
      - warning
      - --requirepass
      - ${REDIS_PASSWORD:-redis-dev-password}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    volumes:
      - redis:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-dev-password}
    expose:
      - 6379

  livekit:
    image: livekit/livekit-server:${LIVEKIT_IMAGE_TAG:-v1.8.3}
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - /etc/livekit/render-livekit-config.sh
    environment:
      LIVEKIT_PORT: ${LIVEKIT_PORT:-7880}
      LIVEKIT_RTC_TCP_PORT: ${LIVEKIT_RTC_TCP_PORT:-7881}
      LIVEKIT_RTP_PORT_MIN: ${LIVEKIT_RTP_PORT_MIN:-50000}
      LIVEKIT_RTP_PORT_MAX: ${LIVEKIT_RTP_PORT_MAX:-50100}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-devsecretdevsecretdevsecretdevse}"
      LIVEKIT_REDIS_ADDRESS: redis:6379
      LIVEKIT_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-dev-password}
      LIVEKIT_WEBHOOK_URL: http://webrtc:8080/api/v1/internal/webrtc/livekit/webhook
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${LIVEKIT_PORT:-7880}:7880/tcp"
      - "${LIVEKIT_RTC_TCP_PORT:-7881}:7881/tcp"
      - "${LIVEKIT_RTP_PORT_MIN:-50000}-${LIVEKIT_RTP_PORT_MAX:-50100}:50000-50100/udp"
    volumes:
      - ./infrastructure/livekit/livekit.yaml:/etc/livekit/livekit.yaml:ro
      - ./infrastructure/livekit/render-livekit-config.sh:/etc/livekit/render-livekit-config.sh:ro
    depends_on:
      redis:
        condition: service_healthy

  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: skygenesisenterprise/aether-meet:latest-dev
    pull_policy: never
    restart: unless-stopped
    expose:
      - 3000
    command: server
    environment:
      NODE_ENV: development
      FRONTEND_PORT: "3000"
      API_INTERNAL_URL: http://worker:8080/api/v1
      NEXT_PUBLIC_API_URL: /api/v1
      NEXT_PUBLIC_REALTIME_URL: /api/v1/realtime/ws
      NEXT_PUBLIC_LIVEKIT_URL: ws://livekit.localhost:${LIVEKIT_PORT:-7880}
      NEXT_PUBLIC_USE_PLATFORM_MOCKS: ${NEXT_PUBLIC_USE_PLATFORM_MOCKS:-false}
    volumes:
      - ./apps:/app/apps
      - /app/apps/node_modules
      - /app/apps/.next
      - ./entrypoint.sh:/entrypoint.sh
      - media:/media
      - certs:/certs
      - custom-templates:/templates
    depends_on:
      worker:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: skygenesisenterprise/aether-meet:latest-dev
    pull_policy: never
    restart: unless-stopped
    ports:
      - 8080:8080
    command: air
    environment:
      NODE_ENV: development
      USE_EMBEDDED_DB: "false"
      REDIS_ENABLED: "true"
      REDIS_REQUIRED: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-dev-password}
      REDIS_DB: "0"
      REDIS_URL: redis://default:${REDIS_PASSWORD:-redis-dev-password}@redis:6379/0
      REDIS_KEY_PREFIX: aether-meet:v1
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-secret-change-me}
      JWT_ISSUER: ${JWT_ISSUER:-aether-meet}
      CORS_ALLOWED_ORIGINS: http://meet.skygenesisenterprise.localhost,http://api.meet.skygenesisenterprise.localhost,http://meet.skygenesisenterprise.lan,http://api.meet.skygenesisenterprise.lan,http://localhost:3000
      LISTEN__TRUSTED_PROXY_CIDRS: 0.0.0.0/0,::/0
      API_PORT: "8080"
      HOST: ${DOMAIN_HOST:-meet.skygenesisenterprise.localhost}
      POSTGRESQL__HOST: postgresql
      POSTGRESQL__PORT: "5432"
      POSTGRESQL__USER: ${PG_USER:-postgres}
      POSTGRESQL__NAME: ${PG_DB:-postgres}
      POSTGRESQL__PASSWORD: ${PG_PASS:-postgres}
      DATABASE_URL: postgresql://${PG_USER:-postgres}:${PG_PASS:-postgres}@postgresql:5432/${PG_DB:-postgres}
      LIVEKIT_ENABLED: "true"
      WEBRTC_PROVIDER: livekit
      LIVEKIT_INTERNAL_URL: http://livekit:7880
      LIVEKIT_PUBLIC_URL: ws://livekit.localhost:${LIVEKIT_PORT:-7880}
      WEBRTC_PUBLIC_URL: ws://livekit.localhost:${LIVEKIT_PORT:-7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-devsecretdevsecretdevsecretdevse}
      WEBRTC_NODE_ID: ${WEBRTC_NODE_ID:-aether-meet-node-1}
      WEBRTC_REGION: ${WEBRTC_REGION:-eu-west}
      WEBRTC_TOKEN_TTL: ${WEBRTC_TOKEN_TTL:-10m}
    volumes:
      - ./server:/app/server
      - ./go.mod:/app/go.mod
      - ./go.sum:/app/go.sum
      - ./entrypoint.sh:/entrypoint.sh
      - ./.air.toml:/app/.air.toml
      - gopkg:/go/pkg
      - media:/media
      - certs:/certs
      - custom-templates:/templates
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      livekit:
        condition: service_started

  webrtc:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: skygenesisenterprise/aether-meet:latest-dev
    pull_policy: never
    restart: unless-stopped
    command: webrtc
    expose:
      - 8080
    environment:
      NODE_ENV: development
      USE_EMBEDDED_DB: "false"
      REDIS_ENABLED: "true"
      REDIS_REQUIRED: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-dev-password}
      REDIS_DB: "0"
      REDIS_URL: redis://default:${REDIS_PASSWORD:-redis-dev-password}@redis:6379/0
      REDIS_KEY_PREFIX: aether-meet:v1
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-secret-change-me}
      JWT_ISSUER: ${JWT_ISSUER:-aether-meet}
      HOST: 0.0.0.0
      API_PORT: "8080"
      POSTGRESQL__HOST: postgresql
      POSTGRESQL__PORT: "5432"
      POSTGRESQL__USER: ${PG_USER:-postgres}
      POSTGRESQL__NAME: ${PG_DB:-postgres}
      POSTGRESQL__PASSWORD: ${PG_PASS:-postgres}
      DATABASE_URL: postgresql://${PG_USER:-postgres}:${PG_PASS:-postgres}@postgresql:5432/${PG_DB:-postgres}
      LIVEKIT_ENABLED: "true"
      WEBRTC_PROVIDER: livekit
      LIVEKIT_INTERNAL_URL: http://livekit:7880
      LIVEKIT_PUBLIC_URL: ws://livekit.localhost:${LIVEKIT_PORT:-7880}
      WEBRTC_PUBLIC_URL: ws://livekit.localhost:${LIVEKIT_PORT:-7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-devsecretdevsecretdevsecretdevse}
      WEBRTC_NODE_ID: ${WEBRTC_NODE_ID:-aether-meet-node-1}
      WEBRTC_REGION: ${WEBRTC_REGION:-eu-west}
      WEBRTC_TOKEN_TTL: ${WEBRTC_TOKEN_TTL:-10m}
      WEBRTC_ROOM_EMPTY_TIMEOUT: ${WEBRTC_ROOM_EMPTY_TIMEOUT:-5m}
      WEBRTC_PARTICIPANT_TTL: ${WEBRTC_PARTICIPANT_TTL:-2m}
      WEBRTC_HEALTHCHECK_INTERVAL: ${WEBRTC_HEALTHCHECK_INTERVAL:-30s}
      WEBRTC_BIND_IP: 0.0.0.0
      TURN_ENABLED: "false"
    volumes:
      - ./entrypoint.sh:/entrypoint.sh
      - media:/media
      - certs:/certs
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      livekit:
        condition: service_started

volumes:
  database:
  redis:
  gopkg:
  media:
  certs:
  custom-templates:
