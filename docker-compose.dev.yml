services:
  postgresql:
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 5s
    volumes:
      - database:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${PG_PASS:-postgres}
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_DB: ${PG_DB:-postgres}
    expose:
      - 5432

  redis:
    image: docker.io/library/redis:8-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --loglevel
      - warning
      - --requirepass
      - ${REDIS_PASSWORD:-redis-dev-password}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    volumes:
      - redis:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-dev-password}
    expose:
      - 6379

  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: skygenesisenterprise/aether-meet:latest-dev
    restart: unless-stopped
    ports:
      - 3000:3000
    command: server
    environment:
      NODE_ENV: development
      USE_EMBEDDED_DB: "false"
      REDIS_ENABLED: "true"
      REDIS_REQUIRED: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-dev-password}
      REDIS_DB: "0"
      REDIS_URL: redis://default:${REDIS_PASSWORD:-redis-dev-password}@redis:6379/0
      REDIS_KEY_PREFIX: aether-meet:v1
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      LISTEN__TRUSTED_PROXY_CIDRS: 0.0.0.0/0,::/0
      HOST: ${DOMAIN_HOST:-localhost}
      FRONTEND_PORT: "3000"
      API_PORT: "8080"
      POSTGRESQL__HOST: postgresql
      POSTGRESQL__PORT: "5432"
      POSTGRESQL__USER: ${PG_USER:-postgres}
      POSTGRESQL__NAME: ${PG_DB:-postgres}
      POSTGRESQL__PASSWORD: ${PG_PASS:-postgres}
      DATABASE_URL: postgresql://${PG_USER:-postgres}:${PG_PASS:-postgres}@postgresql:5432/${PG_DB:-postgres}
      WEBRTC_URL: ${WEBRTC_URL:-webrtc:9090}
    volumes:
      - media:/media
      - certs:/certs
      - custom-templates:/templates
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: skygenesisenterprise/aether-meet:latest-dev
    restart: unless-stopped
    ports:
      - 8080:8080
    command: worker
    environment:
      NODE_ENV: development
      USE_EMBEDDED_DB: "false"
      REDIS_ENABLED: "true"
      REDIS_REQUIRED: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-dev-password}
      REDIS_DB: "0"
      REDIS_URL: redis://default:${REDIS_PASSWORD:-redis-dev-password}@redis:6379/0
      REDIS_KEY_PREFIX: aether-meet:v1
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      HOST: ${DOMAIN_HOST:-localhost}
      POSTGRESQL__HOST: postgresql
      POSTGRESQL__PORT: "5432"
      POSTGRESQL__USER: ${PG_USER:-postgres}
      POSTGRESQL__NAME: ${PG_DB:-postgres}
      POSTGRESQL__PASSWORD: ${PG_PASS:-postgres}
      DATABASE_URL: postgresql://${PG_USER:-postgres}:${PG_PASS:-postgres}@postgresql:5432/${PG_DB:-postgres}
    volumes:
      - media:/media
      - certs:/certs
      - custom-templates:/templates
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy

  webrtc:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: skygenesisenterprise/aether-meet:latest-dev
    restart: unless-stopped
    command: webrtc
    expose:
      - 9090
      - 3478
    ports:
      - "${WEBRTC_STUN_PORT:-3478}:3478/udp"
      - "${WEBRTC_STUN_PORT:-3478}:3478/tcp"
      - "${WEBRTC_RTP_PORT_MIN:-50000}-${WEBRTC_RTP_PORT_MAX:-50100}:50000-50100/udp"
    environment:
      NODE_ENV: development
      USE_EMBEDDED_DB: "false"
      REDIS_ENABLED: "true"
      REDIS_REQUIRED: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-dev-password}
      REDIS_DB: "0"
      REDIS_URL: redis://default:${REDIS_PASSWORD:-redis-dev-password}@redis:6379/0
      REDIS_KEY_PREFIX: aether-meet:v1
      HOST: ${DOMAIN_HOST:-localhost}
      POSTGRESQL__HOST: postgresql
      POSTGRESQL__PORT: "5432"
      POSTGRESQL__USER: ${PG_USER:-postgres}
      POSTGRESQL__NAME: ${PG_DB:-postgres}
      POSTGRESQL__PASSWORD: ${PG_PASS:-postgres}
      DATABASE_URL: postgresql://${PG_USER:-postgres}:${PG_PASS:-postgres}@postgresql:5432/${PG_DB:-postgres}
      WEBRTC_BIND_IP: 0.0.0.0
      WEBRTC_PUBLIC_IP: ${WEBRTC_PUBLIC_IP:-}
      WEBRTC_SIGNALING_PORT: "9090"
      WEBRTC_STUN_PORT: "3478"
      WEBRTC_RTP_PORT_MIN: "50000"
      WEBRTC_RTP_PORT_MAX: "50100"
    volumes:
      - media:/media
      - certs:/certs
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  database:
  redis:
  media:
  certs:
  custom-templates:
